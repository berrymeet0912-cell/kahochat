<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>チャットアプリ</title>
  <style>
    .zpoint-history-list { width: 100%; display: flex; flex-direction: column; gap: 12px; overflow-y: auto; max-height: 60vh; padding-bottom: 20px; }
    .history-item { background: #1f2833; border-radius: 12px; padding: 15px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; }
    .history-info { display: flex; flex-direction: column; gap: 6px; }
    .history-title { font-size: 14px; font-weight: bold; color: #fff; }
    .history-date { font-size: 11px; color: #888; }
    .history-amount { font-size: 18px; font-weight: 300; }
    .history-amount.plus { color: #66fcf1; }
    .history-amount.minus { color: #ff6b6b; }

    .notif-overlay { position: fixed; top: 0; width: 100%; height: 100%; z-index: 5000; display: flex; justify-content: center; padding-top: 20px; pointer-events: none; }
    .notif-banner { width: 90%; max-width: 400px; height: auto; min-height: 60px; background: #222; border-radius: 15px; padding: 15px; display: flex; flex-direction: row; align-items: flex-start; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); animation: slideDown 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); pointer-events: auto; cursor: pointer; }
    .notif-icon { font-size: 24px; line-height: 1; }
    .notif-body { display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
    .notif-title { font-weight: bold; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .notif-text { font-size: 13px; color: #aaa; word-wrap: break-word; }
    @keyframes slideDown { from { transform: translateY(-150px); } to { transform: translateY(0); } }

    .zpoint-recipient-wrap { background: #1f2833; padding: 15px 20px; border-radius: 12px; width: 100%; margin-bottom: 25px; border: 1px solid #333; display: flex; flex-direction: column; gap: 8px; }
    .zpoint-recipient-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .zpoint-select { width: 100%; background: transparent; border: none; color: #66fcf1; font-size: 18px; font-weight: bold; outline: none; cursor: pointer; appearance: none; -webkit-appearance: none; }
    .zpoint-select option { background: #111; color: white; }

    .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
    .toast { background: rgba(30, 30, 30, 0.95); color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); animation: toastFadeIn 0.3s, toastFadeOut 0.3s 2.7s forwards; backdrop-filter: blur(5px); border: 1px solid #444; text-align: center; }
    .toast.error { border-color: #ff3b30; color: #ff6b6b; }
    @keyframes toastFadeIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toastFadeOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }

    .zpoint-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0c10; z-index: 4000; display: flex; flex-direction: column; font-family: -apple-system, sans-serif; animation: slideUp 0.3s ease-out; color: white; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .zpoint-header { background: #1f2833; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
    .zpoint-header-left { display: flex; align-items: center; gap: 10px; }
    .zpoint-logo { font-weight: 900; font-size: 20px; color: #66fcf1; letter-spacing: 1px; font-style: italic; }
    .zpoint-badge { background: #45a29e; color: #0b0c10; font-size: 9px; padding: 2px 6px; border-radius: 4px; font-weight: bold; }
    .zpoint-close { background: none; border: none; color: #c5c6c7; font-size: 24px; cursor: pointer; }
    .zpoint-page { padding: 20px; flex: 1; display: flex; flex-direction: column; align-items: center; }
    .zpoint-card { background: linear-gradient(135deg, #1f2833 0%, #111 100%); border-radius: 20px; width: 100%; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; overflow: hidden; margin-bottom: 25px; border: 1px solid #333; }
    .zpoint-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(102,252,241,0.1) 0%, transparent 60%); pointer-events: none; }
    .zpoint-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px; }
    .zpoint-balance { font-size: 40px; margin: 0; color: #fff; font-weight: 300; letter-spacing: 2px; display: flex; align-items: baseline; }
    .zpoint-card-chip { width: 40px; height: 30px; background: linear-gradient(135deg, #d4af37, #aa7700); border-radius: 5px; position: absolute; right: 25px; top: 30px; opacity: 0.8; }
    .zpoint-actions { display: flex; gap: 20px; width: 100%; justify-content: center; margin-bottom: 30px; }
    .zpoint-action-btn { display: flex; flex-direction: column; align-items: center; gap: 10px; color: #c5c6c7; font-size: 12px; cursor: pointer; flex: 1; }
    .zpoint-icon { width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 24px; color: #0b0c10; font-weight: bold; }
    .send-icon { background: #45a29e; box-shadow: 0 4px 15px rgba(69,162,158,0.3); }
    .history-icon { background: #1f2833; color: #66fcf1; border: 1px solid #333; }
    .zpoint-page-title { color: #fff; margin-bottom: 10px; font-size: 20px; font-weight: 300; }
    .zpoint-input-wrap { width: 100%; background: #1f2833; border-radius: 12px; border: 1px solid #333; display: flex; align-items: center; padding: 12px 20px; margin-bottom: 30px; transition: 0.3s; }
    .zpoint-input-wrap:focus-within { border-color: #66fcf1; box-shadow: 0 0 10px rgba(102,252,241,0.2); }
    .zpoint-currency { font-size: 24px; color: #66fcf1; margin-right: 15px; }
    .zpoint-amount { border: none; outline: none; width: 100%; font-size: 36px; font-weight: 300; color: white; background: transparent; }
    .zpoint-primary-btn { background: linear-gradient(90deg, #45a29e, #66fcf1); color: #0b0c10; border: none; width: 100%; padding: 18px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 20px rgba(102,252,241,0.4); }
    .payment-bubble { background: #1f2833; color: #fff; border-radius: 16px; overflow: hidden; width: 220px; border: 1px solid #333; }
    .payment-header { background: #0b0c10; color: #66fcf1; padding: 12px; font-weight: bold; font-size: 11px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #222; }
    .payment-body { padding: 20px 15px; text-align: center; }
    .payment-amount { font-size: 24px; font-weight: 300; margin-bottom: 5px; color: #fff; }
    .payment-desc { font-size: 11px; color: #888; }
    .plus-btn { background: none; border: none; color: #aaa; font-size: 24px; cursor: pointer; padding: 0 5px; flex-shrink: 0; }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      background: #000;
      color: white;
      font-family: -apple-system, sans-serif;
      overflow: hidden;
      height: 100dvh;
      height: 100vh;
      width: 100vw;
    }

    .disclaimer-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: flex; justify-content: center; align-items: center; padding: 20px; backdrop-filter: blur(5px); }
    .disclaimer-card { background: #1a1a1a; padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; border: 1px solid #444; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
    .disclaimer-title { font-size: 18px; font-weight: bold; color: #ff6b6b; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
    .disclaimer-text { font-size: 14px; color: #ddd; line-height: 1.6; margin-bottom: 15px; }
    .disclaimer-btn { width: 100%; padding: 15px; background: #6a1b9a; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; transition: 0.2s; }
    .disclaimer-btn:active { transform: scale(0.98); background: #8a2be2; }

    .setup-wrapper { display: flex; justify-content: center; align-items: center; height: 100dvh; height: 100vh; padding: 20px; }
    .setup-card { background: #1a1a1a; padding: 25px; border-radius: 20px; width: 100%; max-width: 360px; border: 1px solid #333; }
    .setup-title { font-size: 20px; margin-bottom: 15px; text-align: center; }
    .input-group { margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px; }
    .input-group label { font-size: 11px; color: #888; }
    .input-group input, .input-group select { background: #2a2a2a; border: 1px solid #444; color: white; padding: 12px; border-radius: 10px; outline: none; }
    .photo-setup { display: flex; align-items: center; gap: 15px; background: #222; padding: 8px; border-radius: 12px; }
    .setup-preview-img { width: 50px; height: 50px; border-radius: 50%; object-fit: cover; border: 2px solid #8a2be2; background-color: #333; }
    .mini-btn { background: #444; color: white; border: none; padding: 8px 12px; border-radius: 8px; font-size: 11px; cursor: pointer; }
    .primary-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: #8a2be2; color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .primary-btn:disabled { background: #555; cursor: not-allowed; }
    .hidden { display: none !important; }
    
    .sns-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 500; overflow-y: auto; display: flex; flex-direction: column; }
    .sns-header { padding: 15px; font-weight: bold; text-align: center; border-bottom: 1px solid #222; position: sticky; top: 0; background: rgba(0,0,0,0.95); z-index: 10; display: flex; justify-content: center; align-items: center; }
    .sns-close-btn { position: absolute; right: 15px; background: none; border: none; color: white; font-size: 22px; cursor: pointer; padding: 5px; }
    .sns-feed { flex: 1; width: 100%; max-width: 500px; margin: 0 auto; padding: 20px 15px 40px 15px; display: flex; flex-direction: column; gap: 20px; }
    .sns-post { display: flex; gap: 12px; border-bottom: 1px solid #222; padding-bottom: 20px; }
    .sns-post-icon { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background-color: #333; }
    .sns-post-body { flex: 1; display: flex; flex-direction: column; gap: 4px; }
    .sns-post-user-row { display: flex; justify-content: space-between; align-items: baseline; }
    .sns-post-user { font-weight: bold; font-size: 15px; }
    .sns-post-time { font-size: 12px; color: #888; }
    .sns-post-text { font-size: 14px; line-height: 1.5; color: #eee; word-wrap: break-word; }

    .app-wrapper { display: flex; justify-content: center; height: 100dvh; height: 100vh; }
    .app-container { display: flex; width: 100%; max-width: 600px; background: #000; border-left: 1px solid #222; border-right: 1px solid #222; overflow: hidden; position: relative; height: 100%; }

    .sidebar { width: 220px; background: #111; border-right: 1px solid #222; display: flex; flex-direction: column; flex-shrink: 0; }
    @media (max-width: 480px) { .sidebar { width: 75px; } .list-content, .sidebar-header, .sidebar-divider { display: none; } }
    .sidebar-header, .sidebar-divider { padding: 15px; font-size: 11px; color: #444; font-weight: bold; text-transform: uppercase; }
    .chat-item { display: flex; padding: 12px; gap: 10px; cursor: pointer; align-items: center; opacity: 0.4; position: relative; }
    .chat-item.active { background: #1a1a1a; opacity: 1; border-left: 3px solid #8a2be2; }
    .list-icon { width: 44px; height: 44px; border-radius: 14px; object-fit: cover; flex-shrink: 0; cursor: pointer; background-color: #333; }

    .main-content { flex: 1; display: flex; flex-direction: column; background: #0c0c0c; position: relative; overflow: hidden; height: 100%; min-height: 0; }
    .chat-box { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; min-height: 0; }

    .typing { display: flex; gap: 4px; padding: 12px; background: #222; border-radius: 18px; width: fit-content; margin-left: 40px; margin-bottom: 10px; }
    .dot { width: 6px; height: 6px; background: #888; border-radius: 50%; animation: blink 1.4s infinite both; }
    .dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%, 80%, 100% { opacity: 0; } 40% { opacity: 1; } }
    .message-wrapper { display: flex; gap: 8px; width: 100%; align-items: flex-end; }
    .ai-wrapper { justify-content: flex-start; }
    .user-wrapper { justify-content: flex-end; }
    .message { padding: 10px 14px; border-radius: 18px; font-size: 14px; max-width: 75%; line-height: 1.4; word-wrap: break-word; }
    .ai-message { background: #6a1b9a; border-top-left-radius: 2px; }
    .user-message { background: #333; border-top-right-radius: 2px; }
    .bf-message { background: #0d47a1; border-top-left-radius: 2px; }
    .chat-icon { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; cursor: pointer; background-color: #333; }
    .meta-info { font-size: 9px; color: #444; display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
    .read-mark { color: #8a2be2; font-weight: bold; }
    .join-wrapper { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0c0c0c; z-index: 100; display: flex; justify-content: center; align-items: center; padding: 20px; text-align: center; }
    .join-card { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 1px solid #333; width: 100%; max-width: 300px; }
    .group-icon-large { font-size: 50px; margin-bottom: 15px; }
    .choice-area { padding: 15px; background: #111; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid #222; flex-shrink: 0; }
    .choice-btn { background: #333; border: 1px solid #8a2be2; color: white; padding: 12px; border-radius: 10px; text-align: center; cursor: pointer; }

    .input-area { padding: 10px 12px; padding-bottom: max(10px, env(safe-area-inset-bottom)); display: flex; gap: 8px; background: #111; border-top: 1px solid #222; flex-shrink: 0; align-items: center; width: 100%; }
    #message-input { flex: 1; min-width: 0; background: #222; border: none; color: white; padding: 12px; border-radius: 20px; outline: none; font-size: 16px; }
    #send-btn { background: #6a1b9a; border: none; color: white; padding: 0 18px; border-radius: 20px; font-weight: bold; cursor: pointer; height: 44px; min-height: 44px; flex-shrink: 0; white-space: nowrap; font-size: 14px; }

    .chat-header { padding: 12px 15px; background: #111; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; z-index: 10; }
    .chat-header-btn { background: none; border: none; color: #aaa; font-size: 18px; cursor: pointer; }
    .call-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; z-index: 3000; display: flex; flex-direction: column; align-items: center; padding-top: 80px; }
    .call-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(180deg, #333 0%, #000 100%); z-index: -1; }
    .call-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; margin-bottom: 20px; border: 2px solid #555; background-color: #333; }
    .call-name { font-size: 24px; font-weight: bold; margin-bottom: 10px; z-index: 1; }
    .call-status { font-size: 16px; color: #aaa; margin-bottom: 40px; z-index: 1; }
    .call-subtitles { font-size: 16px; color: white; text-align: center; padding: 0 30px; height: 80px; line-height: 1.5; font-weight: bold; z-index: 1; }
    .end-call-btn { margin-top: auto; margin-bottom: 60px; width: 70px; height: 70px; border-radius: 50%; background: #ff3b30; color: white; display: flex; align-items: center; justify-content: center; font-size: 30px; border: none; cursor: pointer; z-index: 1; transform: rotate(135deg); }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 2500; display: flex; justify-content: center; align-items: center; }
    .modal-card { background: #1a1a1a; width: 90%; max-width: 300px; border-radius: 15px; padding: 20px; border: 1px solid #333; }
    .modal-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .member-list { display: flex; flex-direction: column; gap: 12px; }
    .member-item { display: flex; align-items: center; gap: 10px; }
    .member-icon { width: 40px; height: 40px; border-radius: 12px; object-fit: cover; cursor: pointer; background-color: #333; }
    .member-name { font-size: 14px; font-weight: bold; }
    .profile-wrapper { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2000; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; color: white; }
    .profile-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: brightness(0.5) blur(10px); z-index: -1; }
    .profile-close { position: absolute; top: 20px; left: 20px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
    .profile-content { width: 100%; display: flex; flex-direction: column; align-items: center; padding-bottom: 80px; }
    .profile-avatar { width: 100px; height: 100px; border-radius: 40px; object-fit: cover; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.2); background-color: #333; }
    .profile-name { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
    .profile-status { font-size: 13px; color: #ccc; margin-bottom: 40px; text-align: center; padding: 0 40px; }
    .profile-actions { display: flex; gap: 40px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 30px; width: 100%; justify-content: center; }
    .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 11px; cursor: pointer; opacity: 0.8; transition: opacity 0.2s; }
    .action-item:hover { opacity: 1; }
    .action-icon { width: 45px; height: 45px; background: rgba(255,255,255,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }

    .badge { position: absolute; top: -5px; right: -5px; background: #ff3b30 !important; color: white !important; font-size: 11px; font-weight: bold; border-radius: 50px; min-width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid #111; z-index: 10; box-shadow: 0 2px 4px rgba(255, 59, 48, 0.4); }

    #progress-container { margin-top: auto; margin-bottom: 20px; margin-left: auto; margin-right: auto; width: 85%; background: rgba(20, 20, 20, 0.85); border-radius: 8px; padding: 10px; border: 1px solid #444; display: flex; flex-direction: column; gap: 5px; pointer-events: none; }
    .progress-label { font-size: 11px; color: #ccc; display: flex; justify-content: space-between; font-weight: bold; }
    .progress-bar-bg { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, #6a1b9a, #8a2be2); width: 0%; transition: width 0.5s ease; }
    @media (max-width: 480px) { #progress-container { width: 90%; padding: 6px 4px; margin-bottom: 15px; } .progress-label { font-size: 9px; flex-direction: column; align-items: center; gap: 2px; } .progress-label span:first-child { font-size: 8px; } }
  </style>
</head>
<body>

<div id="disclaimer-screen" class="disclaimer-wrapper">
  <div class="disclaimer-card">
    <h2 class="disclaimer-title">⚠️ 免責事項</h2>
    <p class="disclaimer-text">• これはフィクションのストーリーを体験するためのエンターテイメントアプリです。</p>
    <p class="disclaimer-text">• 本アプリ内のZ残高は現実の価値はありません。</p>
    <button id="disclaimer-btn" class="disclaimer-btn">同意してはじめる</button>
  </div>
</div>

<div id="setup-screen" class="setup-wrapper" style="display: none;">
  <div class="setup-card">
    <h2 id="setup-title-text" class="setup-title">初期設定</h2>
    <div class="setup-form">
      <div class="input-group"><label>あなたのアイコン</label><div class="photo-setup"><img id="setup-user-preview" src="" class="setup-preview-img"><input type="file" id="reg-user-icon" accept="image/*" style="display:none"><button type="button" class="mini-btn" onclick="document.getElementById('reg-user-icon').click()">写真を選ぶ</button></div></div>
      <div class="input-group"><label>彼女のアイコン</label><div class="photo-setup"><img id="setup-ai-preview" src="" class="setup-preview-img"><input type="file" id="reg-ai-icon" accept="image/*" style="display:none"><button type="button" class="mini-btn" onclick="document.getElementById('reg-ai-icon').click()">写真を選ぶ</button></div></div>
      <div class="input-group"><label>彼氏のアイコン</label><div class="photo-setup"><img id="setup-bf-preview" src="" class="setup-preview-img"><input type="file" id="reg-bf-icon" accept="image/*" style="display:none"><button type="button" class="mini-btn" onclick="document.getElementById('reg-bf-icon').click()">写真を選ぶ</button></div></div>
      <div class="input-group"><label>自分の名前</label><input type="text" id="reg-user-name" placeholder="例：啓太"></div>
      <div class="input-group"><label>あなたの一人称</label><select id="reg-user-fp"><option value="僕">僕</option><option value="俺">俺</option></select></div>
      <div class="input-group"><label>彼女の名前</label><input type="text" id="reg-ai-name" placeholder="例：果歩"></div>
      <div class="input-group"><label>彼女の一人称</label><select id="reg-ai-fp"><option value="name">名前</option><option value="私">私</option><option value="うち">うち</option></select></div>
      <div class="input-group"><label>彼氏の名前</label><input type="text" id="reg-bf-name" placeholder="例：大輔"></div>
      <button id="start-btn" class="primary-btn">物語を開始する</button>
    </div>
  </div>
</div>

<div id="episode-screen" class="setup-wrapper" style="display: none;">
  <div class="setup-card">
    <h2 class="setup-title">エピソード選択</h2>
    <div style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
      <button class="primary-btn" onclick="selectEpisode(1)">エピソード1</button>
      <button class="primary-btn" style="background: #6a1b9a; color: white;" onclick="selectEpisode(2)">エピソード2</button>
    </div>
  </div>
</div>

<div id="story-code-modal" class="modal-overlay" style="display: none;">
  <div class="modal-card">
    <h3 class="modal-title">コード入力</h3>
    <div class="input-group"><input type="text" id="story-code-input" placeholder="コードを入力"></div>
    <button class="primary-btn" onclick="verifyStoryCode()">認証</button>
  </div>
</div>

<div id="play-mode-modal" class="modal-overlay" style="display: none;">
  <div class="modal-card">
    <h3 id="play-mode-title" class="modal-title">プレイ中</h3>
    <button class="primary-btn" onclick="startEpisode(true)">最初から</button>
    <button class="primary-btn" onclick="startEpisode(false)">続きから</button>
  </div>
</div>

<div id="sns-screen" class="sns-wrapper" style="display: none;">
  <div class="sns-header"><span>アーカイブ</span><button id="sns-back-btn" class="sns-close-btn">✕</button></div>
  <div class="sns-feed" id="sns-feed"></div>
</div>

<div id="zpoint-screen" class="zpoint-wrapper" style="display: none;">
  <div class="zpoint-header"><div class="zpoint-header-left"><span class="zpoint-logo">Z-Point</span></div><button class="zpoint-close" onclick="closeZPoint()">✕</button></div>
  <div id="zpoint-home" class="zpoint-page">
    <div class="zpoint-card"><p class="zpoint-label">Balance</p><h1 class="zpoint-balance"><span id="zpoint-balance-display">0</span><span>Z</span></h1></div>
    <div class="zpoint-actions"><div class="zpoint-action-btn" onclick="openZPointSend()"><span>送る</span></div></div>
  </div>
  <div id="zpoint-send" class="zpoint-page" style="display: none;">
    <select id="zpoint-recipient-select" class="zpoint-select"></select>
    <input type="number" id="zpoint-amount-input" placeholder="0" class="zpoint-amount">
    <button class="zpoint-primary-btn" onclick="executeSend()">プレゼントする</button>
  </div>
</div>

<div id="app-wrapper" class="app-wrapper" style="display: none;">
  <div class="app-container">
    <div class="sidebar">
      <div class="sidebar-header">MENU</div>
      <div class="chat-list">
        <div class="chat-item menu-item" onclick="openSNS()">SNS</div>
        <div class="chat-item active" id="list-hina" onclick="switchRoom('hina')">
          <img id="list-icon-hina" src="" class="list-icon"><span id="display-ai-name"></span>
        </div>
        <div class="chat-item hidden" id="list-bf" onclick="switchRoom('bf')">
          <img id="list-icon-bf" src="" class="list-icon"><span id="display-bf-name"></span>
        </div>
        <div class="chat-item hidden" id="list-group" onclick="switchRoom('group')">GROUP</div>
      </div>
      <div id="progress-container"><div class="progress-bar-bg"><div id="progress-bar-fill" class="progress-bar-fill"></div></div></div>
    </div>
    <div class="main-content">
      <div class="chat-header" id="chat-header"><span id="chat-header-title"></span></div>
      <div class="chat-box" id="chat-display"></div>
      <div id="choice-area" class="choice-area" style="display: none;"></div>
      <div class="input-area" id="standard-input"><button class="plus-btn" onclick="openZPoint()">＋</button><input type="text" id="message-input" placeholder="..."><button id="send-btn">送信</button></div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
<script>
const setupUserPreview = document.getElementById("setup-user-preview"), setupAiPreview = document.getElementById("setup-ai-preview"), setupBfPreview = document.getElementById("setup-bf-preview");
const storyCodeInput = document.getElementById("story-code-input"), chatDisplay = document.getElementById("chat-display"), input = document.getElementById("message-input"), choiceArea = document.getElementById("choice-area");
const defaultUserIcon = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%234a90e2'/%3E%3C/svg%3E";
const defaultAiIcon = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23e24a8d'/%3E%3C/svg%3E";
const bfIconDefault = "data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%234ae25c'/%3E%3C/svg%3E";

setupUserPreview.src = defaultUserIcon; setupAiPreview.src = defaultAiIcon; setupBfPreview.src = bfIconDefault;
let state = { names: { user: "", ai: "", bf: "" }, firstPerson: "僕", aiFirstPerson: "私", userIcon: defaultUserIcon, aiIcon: defaultAiIcon, bfIcon: bfIconDefault, storyStep: 0, messages: { hina: [], group: [], bf: [] }, unread: { hina: 0, group: 0, bf: 0 }, isInvited: false, isJoined: false, isBfUnlocked: false, zpointBalance: 15000, zpointHistory: [], ep2_mission: 0, ep2_paid: 0 };
let currentRoom = 'hina', isProcessing = false, targetEpisode = 1;

function getTime() { const n = new Date(); return n.getHours().toString().padStart(2,'0')+":"+n.getMinutes().toString().padStart(2,'0'); }
function escapeHTML(str) { return str.replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m])); }

window.onload = async () => {
  const saved = await localforage.getItem('hinaChat_WebRelease_v1');
  if (saved && saved.names.user) { state = saved; document.getElementById("episode-screen").style.display = "flex"; }
  else { document.getElementById("setup-screen").style.display = "flex"; }
};

window.selectEpisode = (ep) => { targetEpisode = ep; document.getElementById("story-code-modal").style.display = "flex"; };
window.verifyStoryCode = () => {
    const code = storyCodeInput.value.trim().toUpperCase();
    if ((targetEpisode === 1 && code === "A9X7B2M4") || (targetEpisode === 2 && code === "H4F6D2M8")) {
        document.getElementById("story-code-modal").style.display = "none"; startEpisode(true);
    } else alert("Invalid code.");
};

window.startEpisode = (restart) => {
    if (restart) {
        state.storyStep = targetEpisode === 2 ? 100 : 0;
        state.messages = { hina: [], group: [], bf: [] };
        state.isBfUnlocked = targetEpisode === 2;
        state.zpointBalance = 15000; state.ep2_mission = 0; state.ep2_paid = 0;
    }
    document.getElementById("episode-screen").style.display = "none";
    document.getElementById("app-wrapper").style.display = "flex";
    if (state.messages.hina.length === 0) {
        let txt = state.storyStep >= 100 ? "おはよー" : "ねえ、別れてほしい";
        state.messages.hina.push({ role: 'ai', name: state.names.ai, text: txt, icon: state.aiIcon, time: getTime() });
    }
    render(); updateSidebarDisplay(); checkUIState(); save();
};

window.switchRoom = (id) => { currentRoom = id; render(); checkUIState(); save(); };
window.openSNS = () => { document.getElementById("sns-screen").style.display = "flex"; generateSNS(); };
document.getElementById("sns-back-btn").onclick = () => document.getElementById("sns-screen").style.display = "none";

function render() {
  chatDisplay.innerHTML = '';
  document.getElementById("chat-header-title").innerText = currentRoom === 'hina' ? state.names.ai : (currentRoom === 'bf' ? state.names.bf : "グループ");
  state.messages[currentRoom].forEach(m => {
    const isU = m.role === 'user', wrapper = isU ? 'user-wrapper' : 'ai-wrapper', cls = m.role === 'bf' ? 'bf-message' : (isU ? 'user-message' : 'ai-message');
    const icon = isU ? state.userIcon : (m.role === 'bf' ? state.bfIcon : state.aiIcon);
    if (m.isPayment) {
        chatDisplay.innerHTML += `<div class="message-wrapper user-wrapper"><div class="meta-info">${m.time}</div><div class="message-content"><div class="payment-bubble"><div class="payment-body">${m.amount.toLocaleString()} Z</div></div></div><img src="${icon}" class="chat-icon"></div>`;
    } else {
        chatDisplay.innerHTML += `<div class="message-wrapper ${wrapper}">${isU ? `<div class="meta-info">${m.time}</div>` : `<img src="${icon}" class="chat-icon">`}<div class="message ${cls}">${escapeHTML(m.text)}</div>${isU ? `<img src="${icon}" class="chat-icon">` : `<span>${m.time}</span>`}</div>`;
    }
  }); chatDisplay.scrollTop = chatDisplay.scrollHeight;
}

function checkUIState() {
  const choiceArea = document.getElementById("choice-area"), inputArea = document.getElementById("standard-input"), msgIn = document.getElementById("message-input");
  choiceArea.innerHTML = ''; choiceArea.style.display = 'none'; inputArea.style.display = 'flex'; msgIn.readOnly = false; msgIn.placeholder = "メッセージ...";
  let AN = state.names.ai, BN = state.names.bf, FP = state.firstPerson;

  if (currentRoom === 'hina') {
    if (state.storyStep === 100) showChoices([{text:`おはよーございます${AN}様`, next:'ep2_1'}]);
    else if (state.storyStep === 101) showChoices([{text:"お金ないです", next:'ep2_2_1'},{text:"5000でいい？", next:'ep2_2_2'},{text:"いくら？", next:'ep2_2_3'}]);
    else if (state.storyStep === 102 || state.storyStep === 103) showChoices([{text:"許して", next:'ep2_3'}]);
    else if (state.storyStep === 106) showChoices([{text:"無能でごめんなさい", next:'ep2_5_1'},{text:"次必ず送ります", next:'ep2_5_2'},{text:"許してください", next:'ep2_5_3'}]);
    else if (state.storyStep === 107) showChoices([{text:"おっしゃる通りです", next:'ep2_6_1'}]);
    else if (state.storyStep === 108) showChoices([{text:"はい", next:'ep2_6_2'},{text:"おしおきって何？", next:'ep2_6_2'}]);
    else if (state.storyStep === 110) showChoices([{text:"選びました", next:'ep2_7'}]);
    else if (state.storyStep === 111) showChoices([{text:"しました", next:'ep2_8'}]);
    else if (state.storyStep === 112) showChoices([{text:"ありがとう", next:'ep2_9'},{text:"頭の中いっぱいです", next:'ep2_9'}]);
    else if (state.storyStep === 113) showChoices([{text:"可愛いです", next:'ep2_10'},{text:"今でも大好きです", next:'ep2_10'}]);
    else if (state.storyStep === 114) showChoices([{text:"わかりました", next:'ep2_11_1'},{text:"嫌だ", next:'ep2_11_2'}]);
    else if (state.storyStep === 115) showChoices([{text:"その通りです", next:'ep2_12'},{text:"はい", next:'ep2_12'}]);
    else if (state.storyStep === 118) showChoices([{text:"しました", next:'ep2_14'},{text:"謝りました", next:'ep2_13_1'}]);
    else if (state.storyStep === 119) showChoices([{text:"僕が悪いです", next:'ep2_14'}]);
    else if (state.storyStep === 122) showChoices([{text:"はい", next:'ep2_15'},{text:"お願いしました", next:'ep2_15'}]);
    else if (state.storyStep === 123) showChoices([{text:`${FP}が幸せにしたかった`, next:'ep2_16_1'},{text:"そんな..", next:'ep2_16_2'},{text:"お幸せに", next:'ep2_16_3'}]);
    else if (state.storyStep === 124) showChoices([{text:"無理でした", next:'ep2_17_1'},{text:"あきらめます", next:'ep2_17_1'}]);
    else if (state.storyStep === 125) showChoices([{text:"嫌だけど諦めます", next:'ep2_17_1'},{text:"彼の幸せが僕の幸せ", next:'ep2_17_1'},{text:"嫌じゃないです", next:'ep2_17_2'}]);
    else if (state.storyStep === 126) showChoices([{text:"ありがとうございます", next:'ep2_18'},{text:"たくさん見せつけて", next:'ep2_18'}]);
    else if (state.storyStep === 128) showChoices([{text:"はい、僕が悪いです", next:'ep2_19'},{text:"魅力不足でごめんなさい", next:'ep2_19'},{text:"ATMとして使ってください", next:'ep2_19'}]);
    else if (state.storyStep === 129) showChoices([{text:"時間を奪ってすみません", next:'ep2_20'},{text:"幸せにできずごめん", next:'ep2_20'},{text:"ATMとして使ってください", next:'ep2_20'}]);
    else if (state.storyStep === 130) showChoices([{text:"悔しいです", next:'ep2_21'}]);
  }
}

function showChoices(opts) {
  const choiceArea = document.getElementById("choice-area"), inputArea = document.getElementById("standard-input"), msgIn = document.getElementById("message-input");
  inputArea.style.display = 'flex'; choiceArea.style.display = 'none'; choiceArea.innerHTML = ''; msgIn.readOnly = true; msgIn.placeholder = "選択してください...";
  opts.forEach(o => {
    const b = document.createElement('div'); b.className = 'choice-btn'; b.innerText = o.text;
    b.onclick = () => {
      if(isProcessing) return; isProcessing = true;
      state.messages[currentRoom].push({ role:'user', name:state.names.user, text:o.text, time:getTime() });
      choiceArea.style.display = 'none'; msgIn.readOnly = false; render(); setTimeout(() => aiReply(o.next), 500);
    }; choiceArea.appendChild(b);
  });
}

function aiReply(key) {
  showTyping(currentRoom, () => {
    let AN = state.names.ai, BN = state.names.bf, AFP = state.aiFirstPerson, UN = state.names.user;
    let msgs = [];
    if(key === 'ep2_1') { msgs.push(`${UN}くんのおかげでデート楽しかったよ`, `明日もデートだから貢いで〜`); state.storyStep = 101; }
    else if(key === 'ep2_2_1') { msgs.push(`は？`); state.storyStep = 102; }
    else if(key === 'ep2_2_2') { msgs.push(`すくな`); state.storyStep = 102; }
    else if(key === 'ep2_2_3') { msgs.push(`10000かなー`); state.storyStep = 103; }
    else if(key === 'ep2_3') { msgs.push(`5000でいいから早く送って`, `残りの5000の分はおしおきね`); state.storyStep = 105; }
    else if(key === 'ep2_5_1') { msgs.push(`ほんと無能`); state.storyStep = 107; }
    else if(key === 'ep2_5_2') { msgs.push(`そんなのあたりまえじゃん笑`); state.storyStep = 107; }
    else if(key === 'ep2_5_3') { msgs.push(`んーおしおきだね`); state.storyStep = 108; }
    else if(key === 'ep2_6_1' || key === 'ep2_6_2') { msgs.push(`${UN}くんが一番可愛いと思う${AFP}の写真選んで？`); state.storyStep = 110; }
    else if(key === 'ep2_7') { msgs.push(`その写真待ち受けにしてー`); state.storyStep = 111; }
    else if(key === 'ep2_8') { msgs.push(`これでスマホ開くたび思い出すね笑`); state.storyStep = 112; }
    else if(key === 'ep2_9') { msgs.push(`どう？可愛い？`); state.storyStep = 113; }
    else if(key === 'ep2_10') { msgs.push(`ありがとー。でももう${UN}くんのものじゃないよ？`, `理解してもらうためにおしおき。彼氏によろしくお願いしますって送って`); state.storyStep = 114; }
    else if(key === 'ep2_11_1') { msgs.push(`じゃあ彼氏に「負けましたごめんなさい」って送りな`); state.ep2_mission = 1; state.storyStep = 117; }
    else if(key === 'ep2_11_2') { msgs.push(`ふーん。君は${BN}くんに負けたの。謝るのがふつうでしょ？`); state.storyStep = 115; }
    else if(key === 'ep2_12') { msgs.push(`じゃあ「負けましたごめんなさい」って送りな`); state.ep2_mission = 1; state.storyStep = 117; }
    else if(key === 'ep2_13_1') { msgs.push(`君が悪いから謝るんだよ？`); state.storyStep = 119; }
    else if(key === 'ep2_14') { msgs.push(`じゃあ次。彼に"抵抗してごめんなさい。元カノ様をすぐに差し出さなくてごめんなさい。"って送って`); state.ep2_mission = 2; state.storyStep = 120; }
    else if(key === 'ep2_15') { msgs.push(`えらいじゃん笑`, `${BN}くんと幸せになるね`); state.storyStep = 123; }
    else if(key === 'ep2_16_1') { msgs.push(`いやむりでしょ笑 大人しくあきらめてー`); state.storyStep = 124; }
    else if(key === 'ep2_16_2') { msgs.push(`いやなの？笑`); state.storyStep = 125; }
    else if(key === 'ep2_16_3') { msgs.push(`ありがとー笑 幸せになってるとこいっぱい見せつけてあげるね`); state.storyStep = 126; }
    else if(key === 'ep2_17_1') { msgs.push(`だよねー笑 幸せになってるとこいっぱい見せつけてあげるからまってて`); state.storyStep = 126; }
    else if(key === 'ep2_17_2') { msgs.push(`ありがとー笑 幸せになってるとこいっぱい見せつけてあげるね`); state.storyStep = 126; }
    else if(key === 'ep2_18') { msgs.push(`笑笑`, `幸せにできなかった君は、せめてATMとして役に立ってね`, `残酷なこと言っちゃった。ごめん`, `でも魅力不足の君が悪いよね？`); state.storyStep = 128; }
    else if(key === 'ep2_19') { msgs.push(`そうだよね`, `元カレだからって手加減しないからね`, `罰だよ。君と付き合ってた時間も返してほしいくらいだし`); state.storyStep = 129; }
    else if(key === 'ep2_20') { msgs.push(`ひどいこと言われて悔しい？`); state.storyStep = 130; }
    else if(key === 'ep2_21') { msgs.push(`一生悔しがってろ♡`, `ごめんだけどそれがお似合いだよ笑`); state.storyStep = 131; }

    msgs.forEach((m, i) => {
        setTimeout(() => {
            state.messages[currentRoom].push({ role:'ai', name:AN, text:m, icon:state.aiIcon, time:getTime() });
            render(); if(i === msgs.length -1) { isProcessing = false; checkUIState(); save(); }
        }, i * 2000);
    });
  });
}

document.getElementById("send-btn").onclick = () => {
    const val = input.value; if(!val || isProcessing) return;
    if(state.storyStep === 105 && currentRoom === 'hina') {
        state.messages.hina.push({ role:'user', text:val, time:getTime() }); input.value = ''; render(); isProcessing = true;
        showTyping('hina', () => { state.messages.hina.push({ role:'ai', name:state.names.ai, text:'はーやーくー', time:getTime() }); isProcessing = false; render(); }); return;
    }
    if(state.ep2_mission >= 1 && currentRoom === 'bf') {
        state.messages.bf.push({ role:'user', text:val, time:getTime() }); input.value = ''; render(); isProcessing = true;
        showTyping('bf', () => {
            let res = "あ？ちゃんと言えよ", correct = false, v = val.replace(/\s+/g,"");
            if(state.ep2_mission===1 && v==="負けましたごめんなさい") { res="w"; correct=true; state.ep2_mission=1.5; }
            else if(state.ep2_mission===2 && v==="抵抗してごめんなさい。元カノ様をすぐに差し出さなくてごめんなさい。") { res="もう抵抗するなよw"; correct=true; state.ep2_mission=2.5; }
            else if(state.ep2_mission===3 && v==="どうか僕の元カノをよろしくお願いします、幸せにしてあげてください") { res="任せな"; correct=true; state.ep2_mission=3.5; }
            state.messages.bf.push({ role:'bf', name:state.names.bf, text:res, time:getTime() }); isProcessing = false; render();
            if(correct) {
                setTimeout(() => {
                    let next = (state.ep2_mission===1.5)?"ごめんなさいできた？":(state.ep2_mission===2.5)?`じゃあさいごね。"どうか僕の元カノをよろしくお願いします、幸せにしてあげてください"って送って笑`:"しっかりお願いできた？";
                    if(state.ep2_mission===1.5) state.storyStep=118; else if(state.ep2_mission===2.5) state.ep2_mission=3; else state.storyStep=122;
                    state.messages.hina.push({ role:'ai', name:state.names.ai, text:next, time:getTime() }); save();
                }, 2000);
            }
        }); return;
    }
    state.messages[currentRoom].push({ role:'user', text:val, time:getTime() }); input.value = ''; render();
};

function showTyping(room, cb) { if(room!==currentRoom){cb();return;} const t=document.createElement('div'); t.className='typing'; t.innerHTML='<div class="dot"></div><div class="dot"></div><div class="dot"></div>'; chatDisplay.appendChild(t); chatDisplay.scrollTop=chatDisplay.scrollHeight; setTimeout(()=>{t.remove();cb();},2000); }
function openZPoint() { document.getElementById("zpoint-balance-display").innerText = state.zpointBalance.toLocaleString(); document.getElementById("zpoint-screen").style.display="flex"; document.getElementById("zpoint-home").style.display="flex"; document.getElementById("zpoint-send").style.display="none"; }
function closeZPoint() { document.getElementById("zpoint-screen").style.display="none"; }
function openZPointSend() { document.getElementById("zpoint-home").style.display="none"; document.getElementById("zpoint-send").style.display="flex"; const s = document.getElementById("zpoint-recipient-select"); s.innerHTML = `<option value="hina">${state.names.ai}</option><option value="bf">${state.names.bf}</option>`; }
function executeSend() {
    const amt = parseInt(document.getElementById("zpoint-amount-input").value); if(amt > state.zpointBalance || amt <= 0) return;
    state.zpointBalance -= amt; const target = document.getElementById("zpoint-recipient-select").value;
    state.messages[target].push({ role:'user', amount:amt, isPayment:true, time:getTime() });
    if(state.storyStep===105 && target==='hina') { state.ep2_paid += amt; if(state.ep2_paid >= 5000) aiReply('ep2_5_1'); }
    closeZPoint(); render(); save();
}
function generateSNS() { const f = document.getElementById("sns-feed"); f.innerHTML = `<div class="sns-post"><img src="${state.aiIcon}" class="sns-post-icon"><div class="sns-post-body"><b>${state.names.ai}</b><br>幸せになります！</div></div>`; }
function save() { localforage.setItem('hinaChat_WebRelease_v1', state); }
function updateSidebarDisplay() { document.getElementById("display-ai-name").innerText = state.names.ai; document.getElementById("list-icon-hina").src = state.aiIcon; document.getElementById("display-bf-name").innerText = state.names.bf; document.getElementById("list-icon-bf").src = state.bfIcon; if(state.isBfUnlocked) document.getElementById("list-bf").classList.remove("hidden"); }
</script>
</body>
</html>
